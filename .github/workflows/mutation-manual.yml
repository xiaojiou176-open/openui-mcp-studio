name: Mutation Manual

on:
  workflow_dispatch:

concurrency:
  group: mutation-manual-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation_gate:
    name: Mutation Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      TZ: UTC
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run mutation gate in CI container
        uses: ./.github/actions/run-in-ci-container
        with:
          command: npm run mutation:run:full && npm run mutation:gate
          working_directory: .
          registry_password: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload mutation artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: mutation-report-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 14
          path: .runtime-cache/mutation/**
