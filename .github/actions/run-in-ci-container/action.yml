name: "Run In CI Container"
description: "Run commands inside the repository CI image with controlled env passthrough."

inputs:
  image:
    description: "Container image reference. Empty means resolve from the immutable digest declared in .github/ci-image.lock.json."
    required: false
    default: ""
  gemini_api_key:
    description: "Optional Gemini API key passthrough for containerized live/test flows."
    required: false
    default: ""
  command:
    description: "Command to execute in the container."
    required: true
  working_directory:
    description: "Workspace directory to mount into the container."
    required: false
    default: "."
  extra_env_allowlist:
    description: "Additional env var names (comma-separated) to pass through."
    required: false
    default: ""
  pr_base_sha:
    description: "Optional pull request base SHA to expose inside the container."
    required: false
    default: ""
  pr_head_sha:
    description: "Optional pull request head SHA to expose inside the container."
    required: false
    default: ""
  push_before:
    description: "Optional push-before SHA to expose inside the container."
    required: false
    default: ""
  push_sha:
    description: "Optional push head SHA to expose inside the container."
    required: false
    default: ""
  registry:
    description: "Registry hostname used by docker login."
    required: false
    default: "ghcr.io"
  registry_username:
    description: "Registry username."
    required: false
    default: ""
  registry_password:
    description: "Registry password/token."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Run command in repository CI image
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        OPENUI_CI_ALLOW_LOCAL_BOOTSTRAP: "1"
        INPUT_IMAGE: ${{ inputs.image }}
        INPUT_GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working_directory }}
        INPUT_EXTRA_ENV_ALLOWLIST: ${{ inputs.extra_env_allowlist }}
        INPUT_REGISTRY: ${{ inputs.registry }}
        PR_BASE_SHA: ${{ inputs.pr_base_sha }}
        PR_HEAD_SHA: ${{ inputs.pr_head_sha }}
        PUSH_BEFORE: ${{ inputs.push_before }}
        PUSH_SHA: ${{ inputs.push_sha }}
      run: |
        set -euo pipefail
        registry_username="${{ inputs.registry_username }}"
        if [ -z "${registry_username}" ]; then
          registry_username="${{ github.actor }}"
        fi
        registry_password="${{ inputs.registry_password }}"
        if [ -z "${registry_password}" ]; then
          registry_password="${GITHUB_TOKEN:-}"
        fi
        if [ -n "${INPUT_GEMINI_API_KEY}" ]; then
          export GEMINI_API_KEY="${INPUT_GEMINI_API_KEY}"
        fi

        bash ops/ci-container/run-in-container.sh \
          --image "${INPUT_IMAGE}" \
          --command "${INPUT_COMMAND}" \
          --workspace "${INPUT_WORKING_DIRECTORY}" \
          --env-allowlist "${INPUT_EXTRA_ENV_ALLOWLIST}" \
          --registry "${INPUT_REGISTRY}" \
          --registry-username "${registry_username}" \
          --registry-password "${registry_password}"
