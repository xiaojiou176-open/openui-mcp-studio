<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>OpenUI MCP Studio Demo - Brief</title>
		<style>
			:root {
				color-scheme: light;
				font-family:
					"SF Pro Display",
					"Segoe UI",
					Arial,
					sans-serif;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				background: linear-gradient(135deg, #eff5ff 0%, #dfeafc 100%);
				color: #0f172a;
			}

			.canvas {
				width: 1280px;
				height: 720px;
				padding: 34px;
				display: grid;
				grid-template-columns: 360px minmax(0, 1fr);
				gap: 26px;
			}

			.panel {
				padding: 30px 28px 32px;
				border-radius: 32px;
				background: rgba(255, 255, 255, 0.9);
				border: 1px solid rgba(15, 23, 42, 0.08);
				box-shadow: 0 22px 60px rgba(47, 109, 246, 0.14);
				display: flex;
				flex-direction: column;
				justify-content: space-between;
			}

			.kicker {
				display: inline-flex;
				width: fit-content;
				padding: 10px 16px;
				border-radius: 999px;
				background: rgba(47, 109, 246, 0.12);
				color: #234dbf;
				font-size: 16px;
				font-weight: 700;
				letter-spacing: 0.01em;
			}

			.chip {
				display: inline-flex;
				width: fit-content;
				margin-top: 18px;
				padding: 11px 18px;
				border-radius: 999px;
				background: #2f6df6;
				color: white;
				font-size: 24px;
				font-weight: 700;
			}

			.header {
				display: flex;
				flex-direction: column;
				gap: 18px;
			}

			h1,
			p {
				margin: 0;
			}

			h1 {
				font-size: 46px;
				line-height: 1.05;
				letter-spacing: -0.04em;
			}

			p {
				font-size: 22px;
				line-height: 1.45;
				color: #485b77;
			}

			.points {
				display: flex;
				flex-direction: column;
				gap: 12px;
			}

			.point {
				padding: 14px 16px;
				border-radius: 18px;
				background: rgba(15, 23, 42, 0.05);
				font-size: 17px;
				font-weight: 700;
				color: #122038;
			}

			.copy {
				display: flex;
				flex-direction: column;
				gap: 12px;
			}

			.frame {
				border-radius: 32px;
				overflow: hidden;
				border: 1px solid rgba(15, 23, 42, 0.08);
				box-shadow: 0 32px 90px rgba(47, 109, 246, 0.12);
				background: rgba(255, 255, 255, 0.96);
				padding: 16px;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			img {
				display: block;
				width: 100%;
				height: 100%;
				object-fit: contain;
				object-position: center top;
			}
		</style>
	</head>
	<body>
		<main class="canvas">
			<section class="panel">
				<div class="header">
					<div class="kicker">OpenUI MCP Studio demo</div>
					<div class="chip">1. Brief</div>
					<div class="copy">
						<h1>Start with a natural-language UI brief.</h1>
						<p>
							Turn one prompt into inspectable project state instead of
							stopping at a screenshot or a raw text response.
						</p>
					</div>
				</div>

				<div class="points">
					<div class="point">Brief enters the real ship tool</div>
					<div class="point">Proof surface stays visible</div>
					<div class="point">No UI elements are hidden behind the caption</div>
				</div>
			</section>
			<div class="frame">
				<img
					src="./openui-mcp-studio-workbench.png"
					alt="OpenUI MCP Studio workbench"
				/>
			</div>
		</main>
	</body>
</html>
