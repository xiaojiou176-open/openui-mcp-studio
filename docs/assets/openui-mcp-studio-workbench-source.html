<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>OpenUI MCP Studio Workbench</title>
		<style>
			:root {
				color-scheme: light;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				background: #f8fbff;
			}

			.canvas {
				position: relative;
				width: 1280px;
				height: 720px;
				overflow: hidden;
				background: #f8fbff;
			}

			img {
				position: absolute;
				left: 0;
				top: 0;
				display: block;
				width: 1280px;
				height: auto;
				max-width: none;
				filter: contrast(1.08) saturate(1.02);
			}

			.left-trim {
				position: absolute;
				left: 0;
				top: 0;
				bottom: 0;
				width: 12px;
				background: #f8fbff;
			}

			.bottom-fade {
				position: absolute;
				left: 0;
				right: 0;
				bottom: 0;
				height: 126px;
				background: linear-gradient(
					180deg,
					rgba(248, 251, 255, 0) 0%,
					rgba(248, 251, 255, 0.82) 42%,
					#f8fbff 72%,
					#f8fbff 100%
				);
			}
		</style>
	</head>
	<body>
		<main class="canvas">
			<img
				src="../../tests/visual-golden/apps-web-home.png"
				alt="OpenUI MCP Studio workbench"
			/>
			<div class="left-trim"></div>
			<div class="bottom-fade"></div>
		</main>
	</body>
</html>
