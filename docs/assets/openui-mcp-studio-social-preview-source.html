<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>OpenUI MCP Studio Social Preview</title>
		<style>
			:root {
				color-scheme: light;
				font-family:
					"SF Pro Display",
					"Segoe UI",
					Arial,
					sans-serif;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				background:
					radial-gradient(circle at top left, #234dbf 0%, transparent 34%),
					linear-gradient(135deg, #07111f 0%, #0f1d33 42%, #152846 100%);
				color: #f8fbff;
			}

			.canvas {
				width: 1280px;
				height: 640px;
				display: grid;
				grid-template-columns: 1.05fr 0.95fr;
				gap: 28px;
				padding: 48px;
			}

			.left {
				display: flex;
				flex-direction: column;
				justify-content: center;
				gap: 20px;
			}

			.chip {
				width: fit-content;
				padding: 10px 18px;
				border-radius: 999px;
				background: rgba(47, 109, 246, 0.18);
				border: 1px solid rgba(157, 196, 255, 0.28);
				color: #d9e7ff;
				font-size: 18px;
				font-weight: 600;
				letter-spacing: 0.02em;
			}

			h1 {
				margin: 0;
				font-size: 66px;
				line-height: 1.02;
				letter-spacing: -0.05em;
			}

			p {
				margin: 0;
				font-size: 26px;
				line-height: 1.45;
				color: #d5e0f5;
				max-width: 540px;
			}

			.tags {
				display: flex;
				flex-wrap: wrap;
				gap: 12px;
				margin-top: 8px;
			}

			.tag {
				padding: 11px 16px;
				border-radius: 999px;
				background: rgba(255, 255, 255, 0.08);
				color: #ebf2ff;
				font-size: 18px;
				font-weight: 600;
			}

			.right {
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.frame {
				width: 100%;
				border-radius: 28px;
				overflow: hidden;
				border: 1px solid rgba(201, 219, 255, 0.16);
				box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
				background: rgba(255, 255, 255, 0.04);
			}

			img {
				display: block;
				width: 100%;
				height: auto;
			}
		</style>
	</head>
	<body>
		<main class="canvas">
			<section class="left">
				<div class="chip">OpenUI MCP Studio</div>
				<h1>Generate, apply, and verify production-ready UI.</h1>
				<p>
					Turn natural-language briefs into React and shadcn delivery
					workflows with a real proof surface and quality gates.
				</p>
				<div class="tags">
					<div class="tag">Brief to UI</div>
					<div class="tag">Apply Files</div>
					<div class="tag">Quality Gates</div>
				</div>
			</section>
			<section class="right">
				<div class="frame">
					<img
						src="./openui-mcp-studio-workbench.png"
						alt="Workbench preview"
					/>
				</div>
			</section>
		</main>
	</body>
</html>
